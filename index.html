<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Spider Solitaire Game</title>
    <link rel="icon" type="image/png" href="./favicon.png" />
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <!-- ANALYTICS -->
    <script defer src="./bundle.min.js"></script>
</head>

<body>
    <div id="app">
        <div class="top-bar">
            <div class="title"></div>
            <div class="game-links"><a href="/all-games" class="game-link" target="_blank"><span>All Games</span></a> <a
                    href="/blog" class="game-link" target="_blank"><span>Blog</span></a></div>
        </div>
        <div id="game-container"></div>
    </div>
    <script>function adjustTitle() {
            const titleElement = document.querySelector('.title');
            if (window.innerWidth <= 750) {
                titleElement.textContent = 'SOLITAIRE';
            } else {
                titleElement.textContent = 'FREESOLITAIRE.COM - SOLITAIRE';
            }
        }

        function calculateTopBarPosition() {
            const topBar = document.querySelector('.top-bar');
            const topBarHeight = topBar.offsetHeight;
            const viewportHeight = window.innerHeight;
            const bottomPositionPercentage = (topBarHeight / viewportHeight) * 100;

            window.topBarBottomPosition = bottomPositionPercentage * window.innerHeight / 100;
        }

        // Run on initial load and window resize
        window.addEventListener('load', () => {
            adjustTitle();
            calculateTopBarPosition();
        });
        window.addEventListener('resize', () => {
            adjustTitle();
            calculateTopBarPosition();
        });
        function updateFunction() {

            calculateTopBarPosition();
            // Any additional logic you need to run
        }

        // Set up the interval to run the function every 5 milliseconds
        const intervalId = setInterval(updateFunction, 5);</script>
</body>

</html>
